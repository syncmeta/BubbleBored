# XcodeGen spec — generates PendingBotLegacy.xcodeproj.
#
# This is a one-off iOS 15-compatible snapshot of `../ios/`. Source has
# been hand-patched to remove iOS 16+/17+ APIs (NavigationStack →
# NavigationView, PhotosPicker → PHPicker bridge, ShareLink →
# UIActivityViewController bridge, presentation* modifiers gated by
# #available, .onChange reverted to single-arg closure, .fontWeight()
# replaced by .font(.body.weight())). Different bundle id so it can
# coexist with the main app.
#
# Setup:
#   cd ios-legacy && xcodegen generate && open PendingBotLegacy.xcodeproj

name: PendingBotLegacy
options:
  bundleIdPrefix: com.pendingname
  deploymentTarget:
    iOS: "15.0"
  developmentLanguage: zh-Hans
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: "YES"
    # Hard-coded so `xcodegen generate` doesn't blank it out every time —
    # otherwise Xcode pops the "select a team" dialog on every fresh build.
    # If you ship this repo to someone else, swap or move into a gitignored
    # `Local.xcconfig` instead.
    DEVELOPMENT_TEAM: M42BKJN82S
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: NO

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0

targets:
  PendingBotLegacy:
    type: application
    platform: iOS
    sources:
      - path: PendingBot
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: PendingBot/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pendingname.pendingbot.legacy
        INFOPLIST_FILE: PendingBot/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"           # iPhone + iPad
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        # Make Color.accentColor resolve to our asset-catalog AccentColor
        # (the deep forest green). Without this Xcode-generated setting,
        # XcodeGen-built projects fall back to the system blue tint.
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: MarkdownUI
        product: MarkdownUI
    info:
      path: PendingBot/Resources/Info.plist
      properties:
        CFBundleDisplayName: 大绿豆
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # 跳过 App Store Connect 上传后那个 "Missing Compliance / Manage" 步骤。
        # 我们只用 HTTPS / Keychain 这些 Apple 系统加密，没有自研加密，所以填 false
        # 就等于回答了"Does your app use encryption? No"。
        ITSAppUsesNonExemptEncryption: false
        # Cold-start screen — cream background with the brand mark centered.
        # Anything else (text, indicators, app name) is intentionally absent.
        UILaunchScreen:
          UIColorName: Cream
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Self-hosted servers are typically plain http on a LAN IP, so we
        # opt out of ATS for arbitrary loads. Production users with TLS can
        # tighten this back up.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Camera access — for QR scanning during onboarding.
        NSCameraUsageDescription: 用于扫描分享二维码导入服务器
        NSPhotoLibraryUsageDescription: 用于在聊天中发送本地图片
        # Triggered the first time we hit a private-IP server (10.x / 172.16-31.x
        # / 192.168.x / 169.254.x / *.local). The system prompt blocks the call
        # until the user responds; we proactively warm it from ImportFlow so
        # the redeem doesn't time out before they tap "允许".
        NSLocalNetworkUsageDescription: 用于连接你部署在局域网内的大绿豆服务器（公网部署不需要这个权限）。
        # Custom URL scheme — share-link landing pages redirect to
        # pendingbot://import?... when Universal Links don't fire.
        CFBundleURLTypes:
          - CFBundleURLName: com.pendingname.pendingbot
            CFBundleURLSchemes:
              - pendingbot
        # Universal Links — the iOS device fetches AASA from each domain in
        # this list. With self-hosted servers on arbitrary IP:port, the
        # paired domain isn't known at compile time, so we leave this empty
        # in the template. Add specific domains here once you ship publicly.
        # com.apple.developer.associated-domains:
        #   - applinks:your.domain.com
