<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surf Monitor · 待名</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/tokens.css">
  <style>
    /* Design tokens live in /tokens.css. Page-specific layout below. */

    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      background: var(--bg-panel);
    }

    header h1 {
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .crumb {
      font-size: 12px;
      color: var(--text-4);
    }

    .crumb a {
      color: var(--text-3);
      text-decoration: none;
      transition: color var(--fast) var(--ease);
    }
    .crumb a:hover { color: var(--accent); }

    .conn-status {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-4);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .conn-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-4);
      transition: background 200ms var(--ease);
    }
    .conn-dot.ok { background: var(--green); }

    .content { flex: 1; display: flex; min-height: 0; }

    /* ── Left: bot + conversation tree ── */
    .tree-panel {
      width: 320px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      background: var(--bg-panel);
    }

    .tree-header {
      padding: 14px 18px 8px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    .tree-list { flex: 1; overflow-y: auto; padding: 0 10px 12px; }

    .bot-group { margin-bottom: 4px; }

    .bot-group-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--r-sm);
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }

    .bot-avatar {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }

    .bot-group-meta {
      font-size: 10.5px;
      color: var(--text-4);
      font-weight: 400;
      margin-left: auto;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .bot-group-meta.on { color: var(--green-text); }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 8px 34px;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: background var(--fast) var(--ease);
      min-width: 0;
    }

    .conv-item:hover { background: var(--bg-hover); }

    .conv-item.active {
      background: var(--accent-bg);
    }

    .conv-item.active .conv-title { color: var(--accent); font-weight: 500; }

    .conv-title {
      flex: 1;
      font-size: 12.5px;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .conv-title.untitled { color: var(--text-4); font-style: italic; }

    .conv-status {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: transparent;
      flex-shrink: 0;
      transition: background 200ms var(--ease);
    }

    .conv-status.active {
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.15);
      animation: pulse 1.6s var(--ease) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    .empty-tree {
      color: var(--text-4);
      font-size: 12px;
      padding: 20px 14px;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Right: detail + log ── */
    .detail-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .detail-head {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 64px;
    }

    .detail-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .detail-title .title-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .detail-sub {
      font-size: 11.5px;
      color: var(--text-4);
      margin-top: 2px;
    }

    .detail-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: none;
      border-radius: var(--r-sm);
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: -0.005em;
      transition: background var(--fast) var(--ease), opacity var(--fast) var(--ease);
    }

    .btn:disabled { opacity: 0.35; cursor: default; }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover:not(:disabled) { background: var(--red-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg-soft); color: var(--text-1); }

    /* ── Log ── */
    .log-toolbar {
      padding: 10px 24px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      background: var(--bg-panel);
    }

    .log-toolbar label {
      font-size: 11.5px;
      color: var(--text-3);
    }

    .log-toolbar select {
      font-size: 12px;
      font-family: inherit;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-panel);
      color: var(--text-1);
      cursor: pointer;
    }

    .log-toolbar .spacer { flex: 1; }

    .log-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px 24px 20px;
      font-size: 12.5px;
      line-height: 1.75;
      font-family: var(--font-mono);
    }

    .log-entry {
      padding: 3px 0;
      animation: fadeIn 200ms var(--ease) both;
      display: flex;
      gap: 12px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(2px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-time {
      color: var(--text-4);
      flex-shrink: 0;
      font-size: 10.5px;
      min-width: 66px;
      padding-top: 2px;
    }

    .log-bot {
      flex-shrink: 0;
      font-weight: 500;
      font-size: 10.5px;
      min-width: 90px;
      color: var(--accent);
      padding-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-text {
      color: var(--text-2);
      word-break: break-word;
      white-space: pre-wrap;
      flex: 1;
    }

    .log-entry.done .log-text { color: var(--green-text); font-weight: 500; }
    .log-entry.error .log-text { color: var(--red); }

    .empty-log {
      color: var(--text-4);
      font-size: 13px;
      text-align: center;
      margin-top: 80px;
      font-family: var(--font-sans);
    }

    .empty-detail {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-4);
      font-size: 13px;
    }

    /* Scrollbar styles inherit from tokens.css */
  </style>
</head>
<body>
  <header>
    <h1>Surf Monitor</h1>
    <span class="crumb"><a href="/">← 返回主页</a></span>
    <div class="conn-status">
      <span class="conn-dot" id="conn-dot"></span>
      <span id="conn-text">connecting…</span>
    </div>
  </header>

  <div class="content">
    <div class="tree-panel">
      <div class="tree-header">Bots · Conversations</div>
      <div class="tree-list" id="tree-list">
        <div class="empty-tree">Loading…</div>
      </div>
    </div>

    <div class="detail-panel">
      <div class="detail-head" id="detail-head">
        <div>
          <div class="detail-title"><span class="title-text" id="detail-title">Select a conversation</span></div>
          <div class="detail-sub" id="detail-sub">选择左侧任意对话以开始监看</div>
        </div>
        <div class="detail-actions" id="detail-actions"></div>
      </div>

      <div class="log-toolbar">
        <label>Filter</label>
        <select id="filter-scope">
          <option value="all">All events</option>
          <option value="selected">This conversation only</option>
        </select>
        <div class="spacer"></div>
        <label><input type="checkbox" id="auto-scroll" checked style="vertical-align:middle"> Auto-scroll</label>
        <button class="btn btn-ghost" onclick="clearLog()">Clear</button>
      </div>

      <div class="log-area" id="log-area">
        <div class="empty-log">Waiting for surf events…</div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      bots: [],
      bot: new Map(),      // botId -> bot row
      conv: new Map(),     // convId -> { ...conv, botId, botName }
      selected: null,
      logs: JSON.parse(localStorage.getItem('surf_logs') || '[]'),
      es: null,
    };

    init();

    async function init() {
      await loadTree();
      // Deep-link support: /surf.html?conv=<id> auto-selects that conversation
      const urlConv = new URLSearchParams(location.search).get('conv');
      if (urlConv && state.conv.has(urlConv)) {
        state.selected = urlConv;
      }
      render();
      renderLogs();
      if (state.selected) renderDetail();
      connectSSE();
    }

    // ── Data ──

    async function loadTree() {
      try {
        const res = await fetch('/api/surf/bots');
        state.bots = await res.json();
        state.bot.clear();
        state.conv.clear();
        for (const b of state.bots) {
          state.bot.set(b.id, b);
          for (const c of b.conversations || []) {
            state.conv.set(c.id, { ...c, botId: b.id, botName: b.display_name });
          }
        }
      } catch (e) {
        console.error('loadTree error:', e);
      }
    }

    // ── Tree render ──

    function botColor(id) {
      let h = 0;
      for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) | 0;
      return `hsl(${Math.abs(h) % 360}, 55%, 58%)`;
    }

    function botInitial(bot) {
      const name = bot?.display_name || bot?.id || '?';
      return name.trim().charAt(0).toUpperCase();
    }

    function render() {
      const root = document.getElementById('tree-list');
      if (state.bots.length === 0) {
        root.innerHTML = '<div class="empty-tree">还没有 Bot</div>';
        return;
      }

      const html = [];
      for (const bot of state.bots) {
        const convs = bot.conversations || [];
        const active = convs.some(c => c.active);
        html.push(`
          <div class="bot-group">
            <div class="bot-group-head">
              <span class="bot-avatar" style="background:${botColor(bot.id)}">${esc(botInitial(bot))}</span>
              <span>${esc(bot.display_name || bot.id)}</span>
              <span class="bot-group-meta ${active ? 'on' : ''}">${bot.surfing?.enabled ? (active ? 'surfing' : 'enabled') : 'disabled'}</span>
            </div>
            ${convs.length === 0
              ? '<div class="empty-tree" style="margin:4px 0 4px 34px;padding:6px 0;text-align:left;">无对话</div>'
              : convs.map(c => renderConvRow(c, bot.id)).join('')}
          </div>
        `);
      }
      root.innerHTML = html.join('');

      for (const row of root.querySelectorAll('.conv-item')) {
        row.addEventListener('click', () => selectConv(row.dataset.convId));
      }
    }

    function renderConvRow(conv, botId) {
      const active = !!conv.active;
      const selected = state.selected === conv.id ? 'active' : '';
      const title = conv.title || '新对话';
      const untitled = conv.title ? '' : 'untitled';
      return `
        <div class="conv-item ${selected}" data-conv-id="${esc(conv.id)}">
          <span class="conv-status ${active ? 'active' : ''}"></span>
          <span class="conv-title ${untitled}">${esc(title)}</span>
        </div>
      `;
    }

    // ── Detail render ──

    function selectConv(id) {
      state.selected = id;
      render();
      renderDetail();
      if (document.getElementById('filter-scope').value === 'selected') {
        renderLogs();
      }
    }

    function renderDetail() {
      const head = document.getElementById('detail-head');
      const titleEl = document.getElementById('detail-title');
      const subEl = document.getElementById('detail-sub');
      const actions = document.getElementById('detail-actions');

      const conv = state.selected ? state.conv.get(state.selected) : null;

      if (!conv) {
        titleEl.textContent = 'Select a conversation';
        subEl.textContent = '选择左侧任意对话以开始监看';
        actions.innerHTML = '';
        return;
      }

      const bot = state.bot.get(conv.botId);
      const surfEnabled = bot?.surfing?.enabled;
      const running = !!conv.active;
      const titleText = conv.title || '新对话';

      titleEl.textContent = titleText;
      subEl.innerHTML = `
        <span style="color:var(--text-3);font-weight:500">${esc(conv.botName)}</span>
        &middot; ${conv.user_name ? esc(conv.user_name) : '?'}
        &middot; ${conv.round_count ?? 0} rounds
        ${running ? '&middot; <span style="color:var(--green-text);font-weight:500">surfing…</span>' : ''}
      `;

      if (!surfEnabled) {
        actions.innerHTML = `<span style="color:var(--text-4);font-size:11.5px;">该 Bot 未启用 surfing</span>`;
        return;
      }

      actions.innerHTML = `
        <button class="btn btn-primary" id="btn-start" ${running ? 'disabled' : ''}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Start
        </button>
        <button class="btn btn-danger" id="btn-stop" ${running ? '' : 'disabled'}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
          Stop
        </button>
      `;
      document.getElementById('btn-start').onclick = () => startSurf(conv.id);
      document.getElementById('btn-stop').onclick = () => stopSurf(conv.id);
    }

    // ── SSE ──

    function connectSSE() {
      if (state.es) state.es.close();
      state.es = new EventSource('/api/surf/events');

      state.es.onopen = () => {
        document.getElementById('conn-dot').classList.add('ok');
        document.getElementById('conn-text').textContent = 'connected';
      };

      state.es.onerror = () => {
        document.getElementById('conn-dot').classList.remove('ok');
        document.getElementById('conn-text').textContent = 'reconnecting…';
      };

      state.es.addEventListener('init', (e) => {
        const { active } = JSON.parse(e.data);
        setActiveConvs(new Set(active));
      });

      state.es.addEventListener('log', (e) => {
        const data = JSON.parse(e.data);
        addLog(data);
      });

      state.es.addEventListener('done', (e) => {
        const data = JSON.parse(e.data);
        addLog({ ...data, type: 'surf_done', content: 'Surf completed' });
        setConvActive(data.conversationId, false);
      });
    }

    // ── Log ──

    function saveLogs() { localStorage.setItem('surf_logs', JSON.stringify(state.logs)); }

    function addLog(entry) {
      state.logs.push(entry);
      if (state.logs.length > 2000) state.logs.splice(0, state.logs.length - 2000);
      saveLogs();

      const scope = document.getElementById('filter-scope').value;
      if (scope === 'selected' && entry.conversationId !== state.selected) return;

      appendLogRow(entry);
    }

    function renderLogs() {
      const area = document.getElementById('log-area');
      area.innerHTML = '';
      const scope = document.getElementById('filter-scope').value;
      const rows = scope === 'selected'
        ? state.logs.filter(l => l.conversationId === state.selected)
        : state.logs;
      if (rows.length === 0) {
        area.innerHTML = '<div class="empty-log">Waiting for surf events…</div>';
        return;
      }
      for (const r of rows) appendLogRow(r, false);
      scrollLogToBottom();
    }

    function appendLogRow(entry, autoscroll = true) {
      const area = document.getElementById('log-area');
      const empty = area.querySelector('.empty-log');
      if (empty) empty.remove();

      const el = document.createElement('div');
      el.className = 'log-entry';
      if (entry.type === 'surf_done') el.classList.add('done');
      if (entry.type === 'error') el.classList.add('error');

      const time = new Date(entry.timestamp).toLocaleTimeString('zh-CN', { hour12: false });
      const botName = state.bot.get(entry.botId)?.display_name || entry.botId || '';

      el.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-bot" title="${esc(botName)}">${esc(botName)}</span>
        <span class="log-text">${esc(entry.content || '')}</span>
      `;
      area.appendChild(el);

      if (autoscroll && document.getElementById('auto-scroll').checked) scrollLogToBottom();
    }

    function scrollLogToBottom() {
      const area = document.getElementById('log-area');
      area.scrollTop = area.scrollHeight;
    }

    function clearLog() {
      state.logs = [];
      saveLogs();
      renderLogs();
    }

    document.getElementById('filter-scope').addEventListener('change', renderLogs);

    // ── Actions ──

    async function startSurf(convId) {
      setConvActive(convId, true);
      try {
        const res = await fetch(`/api/surf/start/${convId}`, { method: 'POST' });
        const data = await res.json();
        if (data.error) {
          setConvActive(convId, false);
          addLog({ conversationId: convId, botId: state.conv.get(convId)?.botId, type: 'error', content: `Start failed: ${data.error}`, timestamp: Date.now() });
        }
      } catch (e) {
        setConvActive(convId, false);
        addLog({ conversationId: convId, botId: state.conv.get(convId)?.botId, type: 'error', content: `Start failed: ${e.message}`, timestamp: Date.now() });
      }
    }

    async function stopSurf(convId) {
      try {
        await fetch(`/api/surf/stop/${convId}`, { method: 'POST' });
      } catch (e) {
        addLog({ conversationId: convId, botId: state.conv.get(convId)?.botId, type: 'error', content: `Stop failed: ${e.message}`, timestamp: Date.now() });
      }
    }

    function setConvActive(convId, active) {
      const conv = state.conv.get(convId);
      if (!conv) return;
      conv.active = active;
      const bot = state.bot.get(conv.botId);
      if (bot) {
        const row = bot.conversations?.find(c => c.id === convId);
        if (row) row.active = active;
      }
      render();
      if (state.selected === convId) renderDetail();
    }

    function setActiveConvs(activeSet) {
      for (const [id, conv] of state.conv) {
        conv.active = activeSet.has(id);
      }
      for (const bot of state.bots) {
        for (const c of bot.conversations || []) c.active = activeSet.has(c.id);
      }
      render();
      if (state.selected) renderDetail();
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s ?? '';
      return d.innerHTML;
    }
  </script>
</body>
</html>
