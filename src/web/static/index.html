<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BubbleBored</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <nav id="bot-list"></nav>
      <div class="sidebar-footer">
        <button class="footer-btn" id="reset-btn" onclick="resetConversation()" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          清空对话重来
        </button>
        <div class="footer-divider"></div>
        <button class="footer-btn" onclick="showAudit()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/>
          </svg>
          使用统计
        </button>
        <a class="footer-btn" href="/surf.html" target="_blank">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 20l.5-1.5C4 14 6 10 12 10s8 4 9.5 8.5L22 20"/>
            <path d="M12 10V4"/><circle cx="12" cy="4" r="1"/>
          </svg>
          Surf Monitor
        </a>
        <a class="footer-btn" href="/review.html" target="_blank">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/>
          </svg>
          Review Monitor
        </a>
      </div>
    </aside>

    <main id="main">
      <div id="empty-state">
        <div class="empty-icon">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <p>选择一个对话开始</p>
      </div>

      <div id="chat-view" style="display:none">
        <span id="chat-bot-name" style="display:none"></span>
        <div class="messages-scroll">
          <div id="messages"></div>
        </div>
        <div id="input-area">
          <div class="input-outer">
            <div class="input-wrap">
              <textarea id="msg-input" placeholder="发送消息…" rows="1"></textarea>
              <button id="send-btn" onclick="sendMessage()" aria-label="发送">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 19V5"/>
                  <path d="M5 12l7-7 7 7"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="audit-panel" style="display:none">
      <div class="audit-header">
        <h2>使用统计</h2>
        <button class="back-btn" onclick="hideAudit()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
          </svg>
          返回
        </button>
      </div>
      <div class="audit-body">
        <div id="audit-summary"></div>
        <div id="audit-details"></div>
      </div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
