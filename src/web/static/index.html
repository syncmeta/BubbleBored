<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BeyondBubble</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-mark">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M2 12h20"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </div>
          BeyondBubble
        </div>
      </div>
      <nav id="bot-list"></nav>
      <div class="sidebar-footer">
        <button class="footer-btn" onclick="showAudit()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/>
          </svg>
          使用统计
        </button>
      </div>
    </aside>

    <main id="main">
      <div id="empty-state">
        <div class="empty-icon">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <p>选择一个对话开始</p>
      </div>

      <div id="chat-view" style="display:none">
        <span id="chat-bot-name" style="display:none"></span>
        <span id="chat-status" class="status-dot" style="position:fixed;top:8px;right:12px;z-index:10"></span>
        <div class="messages-scroll">
          <div id="messages"></div>
        </div>
        <div id="input-area">
          <div class="input-outer">
            <div class="input-wrap">
              <textarea id="msg-input" placeholder="发送消息…" rows="1"></textarea>
              <button id="send-btn" onclick="sendMessage()" aria-label="发送">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 19V5"/>
                  <path d="M5 12l7-7 7 7"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="audit-panel" style="display:none">
      <div class="audit-header">
        <h2>使用统计</h2>
        <button class="back-btn" onclick="hideAudit()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
          </svg>
          返回
        </button>
      </div>
      <div class="audit-body">
        <div id="audit-summary"></div>
        <div id="audit-details"></div>
      </div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
