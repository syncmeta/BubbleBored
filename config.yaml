server:
  port: 3456
  host: "0.0.0.0"

openrouter:
  defaultModel: "anthropic/claude-opus-4.7"
  debounceModel: "openrouter/free"
  reviewModel: "anthropic/claude-sonnet-4.6"
  surfingModel: "x-ai/grok-4.20"
  # 不填则用 debounceModel
  # titleModel: "openrouter/free"

defaults:
  accessMode: "open"
  review:
    enabled: true
    roundInterval: 8
    timerMs: 10000
    maxSearchRequests: 10
  surfing:
    enabled: true
    autoTrigger: false
    initialIntervalSec: 1800
    multiplier: 1.5
    maxIntervalSec: 86400
    idleStopSec: 172800
    maxRequests: 10
  debounce:
    enabled: true
    windowMs: 2000
    maxWaitMs: 15000

bots:
  default:
    displayName: "AAA"
    promptFile: "default.md"
    # 每个 bot 可以绑定自己的 Telegram / 飞书账号
    # 不填写则仅在网页可用
    #
    # telegram:
    #   enabled: true
    #   token: ""                  # 或环境变量 TELEGRAM_TOKEN_DEFAULT
    #   # webhookUrl: "https://host/webhook/telegram/default"   # 不填则用 polling
    #
    # feishu:
    #   enabled: true
    #   appId: ""                  # 或环境变量 FEISHU_APP_ID_DEFAULT
    #   appSecret: ""              # 或环境变量 FEISHU_APP_SECRET_DEFAULT
    #   # 事件回调地址: https://host/webhook/feishu/default
