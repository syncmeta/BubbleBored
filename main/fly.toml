# Fly.io deploy config for PendingBot backend.
# Single VM in iad (US East — best blended latency for global hobby traffic),
# 256 MB shared CPU + 1 GB volume. Cloudflare sits in front of *.fly.dev for
# WAF / DDoS / global CDN; origin is reached via a Cloudflare-proxied CNAME
# pointing at this app's *.fly.dev hostname.
#
# Deploy:
#   fly launch --no-deploy            # one-time, accept the import
#   fly secrets set OPENROUTER_API_KEY=... CLERK_ISSUER=... BYOK_ENC_KEY=...
#   fly volumes create pendingbot_data --region iad --size 1
#   fly deploy

app = "pendingbot"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3456"
  DATA_DIR = "/data"

# SQLite is single-writer; never run more than one instance. Auto-stop puts
# the VM to sleep when idle and resumes on the next request — for a hobby
# deployment this turns the bill into "pennies per active hour".
[[services]]
  internal_port = 3456
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
    force_https = true

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

  [services.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 500

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[mounts]
  source = "pendingbot_data"
  destination = "/data"
  initial_size = "1gb"
