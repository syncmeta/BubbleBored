server:
  port: 3456
  host: "0.0.0.0"
  # 当本服务部署到公网/有固定域名时填这里。iOS 客户端的「钥匙」分享链接会
  # 默认用这个地址 — 不填的话默认用本机检测到的 LAN IP。
  # publicURL: "https://bot.example.com"

openrouter:
  # Last-resort fallback when a bot omits its `model` field. Each bot
  # otherwise picks its own model below — task-level overrides no longer
  # exist (a bot owns one model for everything it does).
  defaultModel: "anthropic/claude-opus-4.6"

defaults:
  accessMode: "open"
  review:
    enabled: true
    roundInterval: 8
    timerMs: 10000
    maxSearchRequests: 10
  surfing:
    enabled: true
    autoTrigger: false
    initialIntervalSec: 1800
    multiplier: 1.5
    maxIntervalSec: 86400
    idleStopSec: 172800
    maxRequests: 10
  debounce:
    enabled: true
    maxWaitMs: 15000

# 预设机器人 — 名字直接对齐它们用的默认模型,「议论」里也是这套机器人在吵。
# 每个机器人可以绑自己的 Telegram / 飞书账号(不填则仅网页可用);
# 想要同模型不同人格,新增一个 key 改 promptFile 即可。
bots:
  "glm-5.1":
    displayName: "bot-glm-5.1"
    promptFile: "default.md"
    model: "z-ai/glm-5.1"
  "glm-4.5-air":
    displayName: "bot-glm-4.5-air"
    promptFile: "default.md"
    model: "z-ai/glm-4.5-air:free"
  "deepseek-v4-flash":
    displayName: "bot-deepseek-v4-flash"
    promptFile: "default.md"
    model: "deepseek/deepseek-v4-flash"
  "deepseek-v4-pro":
    displayName: "bot-deepseek-v4-pro"
    promptFile: "default.md"
    model: "deepseek/deepseek-v4-pro"
  "minimax-m2.7":
    displayName: "bot-minimax-m2.7"
    promptFile: "default.md"
    model: "minimax/minimax-m2.7"
  "hy3-preview":
    displayName: "bot-hy3-preview"
    promptFile: "default.md"
    model: "tencent/hy3-preview:free"
  "gemini-3.1-flash-lite":
    displayName: "bot-gemini-3.1-flash-lite"
    promptFile: "default.md"
    model: "google/gemini-3.1-flash-lite-preview"
