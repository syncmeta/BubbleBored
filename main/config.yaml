server:
  port: 3456
  host: "0.0.0.0"
  # 当本服务部署到公网/有固定域名时填这里。iOS 客户端的「钥匙」分享链接会
  # 默认用这个地址 — 不填的话默认用本机检测到的 LAN IP。
  # publicURL: "https://bot.example.com"

openrouter:
  defaultModel: "anthropic/claude-opus-4.6"
  debounceModel: "tencent/hy3-preview:free"
  reviewModel: "x-ai/grok-4.20"
  surfingModel: "x-ai/grok-4.20"

  titleModel: "deepseek/deepseek-v4-flash" # 不填则用 debounceModel

defaults:
  accessMode: "open"
  review:
    enabled: true
    roundInterval: 8
    timerMs: 10000
    maxSearchRequests: 10
  surfing:
    enabled: true
    autoTrigger: false
    initialIntervalSec: 1800
    multiplier: 1.5
    maxIntervalSec: 86400
    idleStopSec: 172800
    maxRequests: 10
  debounce:
    enabled: true
    maxWaitMs: 15000

# 预设机器人 — 名字 001/002… 排开,模型对齐「议论」里的预设阵容
# (见 main/src/web/static/app.js 的 DEFAULT_DEBATE_SLUGS)。
# 每个 bot 也可以绑定自己的 Telegram / 飞书账号(不填则仅网页可用)。
bots:
  "001":
    displayName: "01"
    promptFile: "default.md"
    model: "z-ai/glm-5.1"
  "002":
    displayName: "02"
    promptFile: "default.md"
    model: "z-ai/glm-4.5-air:free"
  "003":
    displayName: "03"
    promptFile: "default.md"
    model: "deepseek/deepseek-v4-flash"
  "004":
    displayName: "04"
    promptFile: "default.md"
    model: "deepseek/deepseek-v4-pro"
  "005":
    displayName: "05"
    promptFile: "default.md"
    model: "minimax/minimax-m2.7"
  "006":
    displayName: "06"
    promptFile: "default.md"
    model: "tencent/hy3-preview:free"
  "007":
    displayName: "07"
    promptFile: "default.md"
    model: "google/gemini-3.1-flash-lite-preview"
