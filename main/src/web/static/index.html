<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PendingBot · 待名</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          PendingBot
          <span id="ws-status" class="status-dot" title="连接状态"></span>
        </div>

        <div class="new-chat-wrap">
          <button id="new-chat-btn" class="new-chat-btn" onclick="onNewChatClick(event)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            <span id="new-chat-label">新对话</span>
            <kbd class="kbd">⌘N</kbd>
          </button>
          <div id="bot-picker" class="bot-picker" style="display:none"></div>
        </div>
      </div>

      <div id="feature-tabs" class="feature-tabs" role="tablist">
        <button class="feature-tab active" data-tab="message" role="tab"><span>消息</span></button>
        <button class="feature-tab" data-tab="surf" role="tab"><span>冲浪</span></button>
        <button class="feature-tab" data-tab="review" role="tab"><span>回顾</span></button>
        <button class="feature-tab" data-tab="debate" role="tab"><span>议论</span></button>
        <button class="feature-tab" data-tab="portrait" role="tab"><span>画像</span></button>
        <button class="feature-tab" data-tab="me" role="tab"><span>你</span></button>
      </div>
      <div id="bot-filter" class="bot-filter"></div>
      <nav id="conv-list"></nav>

      <div class="sidebar-footer">
        <button class="footer-btn" onclick="showAudit()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/>
          </svg>
          使用统计
        </button>
      </div>
    </aside>

    <main id="main">
      <div id="empty-state">
        <div class="empty-icon">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <p id="empty-state-text">选个对话，或者开个新的</p>
      </div>

      <!-- Tab-specific placeholder views (画像 / 冲浪 / 回顾 still pending) -->
      <div id="placeholder-view" style="display:none">
        <div class="empty-icon">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M9 8h6M9 12h6M9 16h3"/>
          </svg>
        </div>
        <p id="placeholder-text">施工中 — 等下一阶段实现</p>
      </div>

      <!-- 冲浪 tab — each conversation = one surf run. Live log + final
           result delivered as a chat bubble at the end. -->
      <div id="surf-view" style="display:none">
        <div id="surf-header">
          <div id="surf-title-wrap">
            <span id="surf-title"></span>
            <span id="surf-meta"></span>
          </div>
          <button class="chat-action" id="surf-rerun-btn" onclick="rerunCurrentSurf()" title="重新跑一次">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path d="M3 21v-5h5"/>
            </svg>
          </button>
          <button class="chat-action" id="surf-stop-btn" onclick="stopCurrentSurf()" title="中断">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="6" y="6" width="12" height="12"/>
            </svg>
          </button>
          <button class="chat-action danger" onclick="deleteCurrentSurf()" title="删除">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            </svg>
          </button>
        </div>
        <div class="messages-scroll">
          <div id="surf-log"></div>
        </div>
      </div>

      <!-- Modal: create new surf -->
      <div id="surf-modal" class="modal-overlay" style="display:none" onclick="closeSurfModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div class="modal-head">
            <span>新冲浪</span>
            <button class="modal-close" onclick="closeSurfModal()" aria-label="关闭">×</button>
          </div>
          <div class="modal-body">
            <label class="modal-label">用模型</label>
            <div id="surf-modal-model-host"></div>
            <label class="modal-label">基于哪个消息会话？（可空 — 自由冲浪）</label>
            <div id="surf-modal-source-list" class="source-list"></div>
            <label class="modal-label">预算（搜索 + 阅读次数上限）</label>
            <input type="text" id="surf-modal-budget" placeholder="10">
            <label class="modal-label">冲浪方向</label>
            <div id="surf-modal-direction" class="surf-direction">
              <label class="surf-dir-row">
                <input type="radio" name="surf-direction" value="auto" checked
                       onchange="onSurfDirectionChange()">
                <span>自动选向量（按你的兴趣 / 保存文章 / 最近聊的来挑）</span>
              </label>
              <label class="surf-dir-row">
                <input type="radio" name="surf-direction" value="manual"
                       onchange="onSurfDirectionChange()">
                <span>指定向量</span>
              </label>
              <div id="surf-manual-fields" class="surf-manual-fields" style="display:none">
                <input type="text" id="surf-modal-vector-topic"
                       placeholder="topic（具体到能搜的兴趣点，如：serendipity 引擎的 evaluation）">
                <select id="surf-modal-vector-mode" onchange="onSurfModeChange()">
                  <option value="depth">挖深（追机制 / 原理 / 一手资料）</option>
                  <option value="granular">挖细（子分支 / 边角案例 / 具体例子）</option>
                  <option value="fresh">挖新（最近进展 / 论文 / 发布）</option>
                </select>
                <input type="text" id="surf-modal-vector-fresh"
                       placeholder="freshness window（仅挖新用，如 past 90 days）"
                       style="display:none">
              </div>
              <label class="surf-dir-row">
                <input type="radio" name="surf-direction" value="serendipity"
                       onchange="onSurfDirectionChange()">
                <span>挖远（serendipity）—— 跨域瞎逛模式</span>
              </label>
            </div>
          </div>
          <div class="modal-foot">
            <button class="btn-ghost" onclick="closeSurfModal()">取消</button>
            <button class="btn-primary" id="surf-modal-submit" onclick="submitSurfModal()">开始冲浪</button>
          </div>
        </div>
      </div>

      <!-- 回顾 tab — each conv = one review run. Live log + final
           conclusion bubble. -->
      <div id="review-view" style="display:none">
        <div id="review-header">
          <div id="review-title-wrap">
            <span id="review-title"></span>
            <span id="review-meta"></span>
          </div>
          <button class="chat-action" id="review-rerun-btn" onclick="rerunCurrentReview()" title="重新跑一次">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path d="M3 21v-5h5"/>
            </svg>
          </button>
          <button class="chat-action danger" onclick="deleteCurrentReview()" title="删除">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            </svg>
          </button>
        </div>
        <div class="messages-scroll">
          <div id="review-log"></div>
        </div>
      </div>

      <!-- Modal: create new review -->
      <div id="review-modal" class="modal-overlay" style="display:none" onclick="closeReviewModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div class="modal-head">
            <span>新回顾</span>
            <button class="modal-close" onclick="closeReviewModal()" aria-label="关闭">×</button>
          </div>
          <div class="modal-body">
            <label class="modal-label">用模型</label>
            <div id="review-modal-model-host"></div>
            <label class="modal-label">基于哪个消息会话？（可空 — 自由回顾）</label>
            <div id="review-modal-source-list" class="source-list"></div>
          </div>
          <div class="modal-foot">
            <button class="btn-ghost" onclick="closeReviewModal()">取消</button>
            <button class="btn-primary" onclick="submitReviewModal()">开始回顾</button>
          </div>
        </div>
      </div>

      <!-- 议论 tab — multi-agent group chat. User can't send normal msgs;
           only inject 辟谣 + trigger next round. -->
      <div id="debate-view" style="display:none">
        <div id="debate-header">
          <div id="debate-title-wrap">
            <span id="debate-title"></span>
            <span id="debate-meta"></span>
          </div>
          <button class="chat-action" id="debate-edit-btn" title="改设置" onclick="openDebateEditor()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/>
            </svg>
          </button>
          <button class="chat-action danger" onclick="deleteCurrentDebate()" title="删除">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            </svg>
          </button>
        </div>
        <div class="messages-scroll">
          <div id="debate-messages"></div>
        </div>
        <div id="debate-input-area">
          <div class="input-outer">
            <div class="input-wrap">
              <textarea id="debate-clarify-input" placeholder="辟谣 / 注入观点（可选）" rows="1"></textarea>
              <button id="debate-inject-btn" class="btn-soft" onclick="injectDebateClarification()" title="注入这段并自动开下一轮">注入并下一轮</button>
              <button id="debate-round-btn" onclick="runDebateRoundClick()" aria-label="下一轮议论">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/>
                  <path d="M21 3v5h-5"/>
                  <path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/>
                  <path d="M3 21v-5h5"/>
                </svg>
              </button>
            </div>
            <div id="debate-status" class="debate-status"></div>
          </div>
        </div>
      </div>

      <!-- 画像 tab — pick a source conv, generate 5 kinds of imagined assets,
           chat with the generator about its imagination. -->
      <div id="portrait-view" style="display:none">
        <div id="portrait-header">
          <div id="portrait-title-wrap">
            <span id="portrait-title"></span>
            <span id="portrait-meta"></span>
          </div>
          <button class="chat-action danger" onclick="deleteCurrentPortrait()" title="删除">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            </svg>
          </button>
        </div>
        <div class="portrait-body">
          <div class="portrait-kinds">
            <button class="portrait-kind-btn" data-kind="moments">朋友圈</button>
            <button class="portrait-kind-btn" data-kind="memos">备忘录</button>
            <button class="portrait-kind-btn" data-kind="schedule">日程</button>
            <button class="portrait-kind-btn" data-kind="alarms">闹钟</button>
            <button class="portrait-kind-btn" data-kind="bills">账单</button>
            <label class="portrait-with-image">
              <input type="checkbox" id="portrait-with-image">
              <span>含图</span>
            </label>
          </div>
          <div class="portrait-model-row">
            <span class="portrait-model-label">本次生成用模型</span>
            <div id="portrait-model-host"></div>
            <span class="portrait-model-hint">不选则用「你」tab 里的画像默认</span>
          </div>
          <div id="portrait-feed" class="portrait-feed"></div>
        </div>
        <div id="portrait-input-area">
          <div class="input-wrap">
            <textarea id="portrait-chat-input" placeholder="跟生成画像的 AI 聊几句…" rows="1"></textarea>
            <button id="portrait-chat-send" onclick="sendPortraitChat()">发送</button>
          </div>
        </div>
      </div>

      <!-- Modal: create new portrait conv (pick source) -->
      <div id="portrait-modal" class="modal-overlay" style="display:none" onclick="closePortraitModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div class="modal-head">
            <span>新画像</span>
            <button class="modal-close" onclick="closePortraitModal()" aria-label="关闭">×</button>
          </div>
          <div class="modal-body">
            <label class="modal-label">基于哪个消息会话？</label>
            <div id="portrait-source-list" class="source-list"></div>
          </div>
          <div class="modal-foot">
            <button class="btn-ghost" onclick="closePortraitModal()">取消</button>
          </div>
        </div>
      </div>

      <!-- Modal: create / edit debate -->
      <div id="debate-modal" class="modal-overlay" style="display:none" onclick="closeDebateModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div class="modal-head">
            <span id="debate-modal-title">新议论</span>
            <button class="modal-close" onclick="closeDebateModal()" aria-label="关闭">×</button>
          </div>
          <div class="modal-body">
            <label class="modal-label">议题（可空，默认对最近聊天的整体观感）</label>
            <textarea id="debate-modal-topic" rows="2" placeholder="比如：这个产品立意"></textarea>
            <label class="modal-label">参与模型（至少 2 个）</label>
            <div id="debate-modal-models-host"></div>
            <a class="modal-link" onclick="switchTab('me')">管理模型库 →</a>
          </div>
          <div class="modal-foot">
            <button class="btn-ghost" onclick="closeDebateModal()">取消</button>
            <button class="btn-primary" id="debate-modal-submit" onclick="submitDebateModal()">创建议论</button>
          </div>
        </div>
      </div>

      <!-- 「你」tab dashboard -->
      <div id="me-view" style="display:none">
        <div class="me-scroll">
          <section class="me-section">
            <h3>基本信息</h3>
            <div class="me-form">
              <label>昵称
                <input type="text" id="me-display-name" maxlength="40" placeholder="昵称">
              </label>
              <label>简介 / 让 AI 一眼读懂你
                <textarea id="me-bio" rows="3" placeholder="一两句话介绍你自己"></textarea>
              </label>
              <button class="btn-primary" id="me-save-profile" onclick="saveMyProfile()">保存</button>
              <span id="me-profile-saved" class="me-saved" hidden>已保存 ✓</span>
            </div>
          </section>

          <section class="me-section" id="me-assignments">
            <h3>系统模型分配 <span class="me-section-hint">每种任务用哪个模型；下拉框直接搜索 OpenRouter 全表</span></h3>
            <div id="me-assignments-list" class="me-assignments-list"></div>
          </section>

          <section class="me-section">
            <h3>AI 收藏 <span class="me-section-hint">AI 觉得你值得读的东西，也可手动添加</span></h3>
            <div id="me-picks-list" class="picks-list"></div>
            <details class="me-add-pick">
              <summary>手动添加一条</summary>
              <div class="me-form">
                <label>标题<input type="text" id="me-pick-title"></label>
                <label>URL（可空）<input type="text" id="me-pick-url"></label>
                <label>简介（可空）<textarea id="me-pick-summary" rows="2"></textarea></label>
                <button class="btn-soft" onclick="addManualPick()">添加</button>
              </div>
            </details>
          </section>
        </div>
      </div>

      <div id="chat-view" style="display:none">
        <div id="chat-header">
          <div id="chat-title-wrap">
            <span id="chat-title"></span>
            <span id="chat-typing" hidden>正在输入<span class="typing-ellipsis"><i>.</i><i>.</i><i>.</i></span></span>
          </div>
          <span id="chat-bot" class="chat-bot-tag"></span>
          <button class="chat-action" onclick="renameCurrentConversation()" title="重命名">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/>
            </svg>
          </button>
          <button class="chat-action" onclick="resetCurrentConversation()" title="清空">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
          </button>

          <!-- 冲浪：触发一次冲浪。结果会进 冲浪 tab 的会话，并把最终消息也回到本聊天里。 -->
          <div class="chat-action-group">
            <button id="surf-btn" class="chat-action" onclick="triggerSurfForCurrent()" title="开一段冲浪（会进入「冲浪」tab 的新会话）">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 20l.5-1.5C4 14 6 10 12 10s8 4 9.5 8.5L22 20"/>
                <path d="M12 10V4"/><circle cx="12" cy="4" r="1"/>
              </svg>
              <svg class="busy-spinner" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M12 2a10 10 0 0 1 10 10" />
              </svg>
            </button>
          </div>

          <!-- 回顾：触发一次回顾。结论会进 回顾 tab 的会话，并补到本聊天里（如果有需要）。 -->
          <div class="chat-action-group">
            <button id="review-btn" class="chat-action" onclick="triggerReviewForCurrent()" title="让 Bot 自审一次（会进入「回顾」tab 的新会话）">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"/>
                <path d="M21 21l-4.3-4.3"/>
                <path d="M11 8v3l2 2"/>
              </svg>
              <svg class="busy-spinner" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M12 2a10 10 0 0 1 10 10" />
              </svg>
            </button>
          </div>

          <button class="chat-action danger" onclick="deleteCurrentConversation()" title="删除对话">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            </svg>
          </button>
        </div>
        <div class="messages-scroll">
          <div id="messages"></div>
        </div>
        <div id="input-area">
          <div class="input-outer">
            <div id="attachment-tray" class="attachment-tray" aria-live="polite"></div>
            <div class="input-wrap">
              <input id="file-input" type="file" accept="image/png,image/jpeg,image/gif,image/webp" multiple style="display:none">
              <button id="attach-btn" class="attach-btn" onclick="onAttachClick()" aria-label="添加图片" title="添加图片  (也可拖放或粘贴)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.49"/>
                </svg>
              </button>
              <textarea id="msg-input" placeholder="发送消息…" rows="1"></textarea>
              <button id="send-btn" onclick="sendMessage()" aria-label="发送">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 19V5"/>
                  <path d="M5 12l7-7 7 7"/>
                </svg>
              </button>
            </div>
          </div>
          <div id="drop-overlay" class="drop-overlay" aria-hidden="true">
            <div class="drop-overlay-inner">
              <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
              </svg>
              <span>松开以添加图片</span>
            </div>
          </div>
        </div>

        <div id="image-viewer" class="image-viewer" aria-hidden="true" onclick="closeImageViewer(event)">
          <button class="image-viewer-close" aria-label="关闭" onclick="closeImageViewer(event)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
          <img id="image-viewer-img" alt="">
        </div>
      </div>
    </main>

    <div id="audit-panel" style="display:none">
      <div class="audit-header">
        <h2>使用统计</h2>
        <button class="back-btn" onclick="hideAudit()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
          </svg>
          返回
        </button>
      </div>
      <div class="audit-body">
        <div id="audit-summary"></div>
        <div id="audit-details"></div>
      </div>
    </div>
  </div>
  <script src="/model-picker.js"></script>
  <script src="/app.js"></script>
</body>
</html>
