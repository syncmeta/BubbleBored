<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Monitor · 待名</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/tokens.css">
  <style>
    /* Design tokens live in /tokens.css. Page-specific additions below. */
    :root {
      --amber-soft: color-mix(in oklch, var(--color-warning) 22%, white);
      --amber-text: oklch(40% 0.10 75);
    }

    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      background: var(--bg-panel);
    }

    header h1 { font-size: 13.5px; font-weight: 600; letter-spacing: -0.02em; }

    .crumb { font-size: 12px; color: var(--text-4); }
    .crumb a { color: var(--text-3); text-decoration: none; transition: color var(--fast) var(--ease); }
    .crumb a:hover { color: var(--accent); }

    .conn-status {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-4);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-4); transition: background 200ms var(--ease); }
    .conn-dot.ok { background: var(--green); }

    .content { flex: 1; display: flex; min-height: 0; }

    /* ── Left: tree ── */
    .tree-panel {
      width: 320px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      background: var(--bg-panel);
    }

    .tree-header {
      padding: 14px 18px 8px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    .tree-list { flex: 1; overflow-y: auto; padding: 0 10px 12px; }

    .bot-group { margin-bottom: 4px; }

    .bot-group-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--r-sm);
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-1);
    }

    .bot-avatar {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }

    .bot-group-meta {
      font-size: 10.5px;
      color: var(--text-4);
      font-weight: 400;
      margin-left: auto;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 8px 34px;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: background var(--fast) var(--ease);
      min-width: 0;
    }

    .conv-item:hover { background: var(--bg-hover); }
    .conv-item.active { background: var(--accent-bg); }
    .conv-item.active .conv-title { color: var(--accent); font-weight: 500; }

    .conv-title {
      flex: 1;
      font-size: 12.5px;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .conv-title.untitled { color: var(--text-4); font-style: italic; }

    .conv-rounds {
      font-size: 10.5px;
      color: var(--text-4);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .conv-pending-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--color-danger) 18%, transparent);
      flex-shrink: 0;
    }

    .empty-tree {
      color: var(--text-4);
      font-size: 12px;
      padding: 20px 14px;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Middle: messages preview ── */
    .msg-panel {
      width: 380px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--bg);
    }

    .msg-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
      background: var(--bg-panel);
    }

    .msg-head-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.01em;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .msg-head-title.untitled { color: var(--text-4); font-style: italic; }

    .msg-head-sub {
      font-size: 11px;
      color: var(--text-4);
    }

    .msg-head-actions {
      margin-top: 10px;
      display: flex;
      gap: 6px;
    }

    .msg-list {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg-empty {
      color: var(--text-4);
      font-size: 12.5px;
      text-align: center;
      margin-top: 40px;
    }

    .msg-item {
      padding: 9px 13px;
      border-radius: var(--r-md);
      font-size: 12.5px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
      max-width: 88%;
    }

    .msg-item.user {
      background: var(--msg-user);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg-item.bot {
      background: var(--msg-bot);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg-sender {
      font-size: 9.5px;
      font-weight: 600;
      color: var(--text-3);
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Right: log ── */
    .log-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .log-toolbar {
      padding: 10px 24px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      background: var(--bg-panel);
    }

    .log-toolbar label { font-size: 11.5px; color: var(--text-3); }

    .log-toolbar select {
      font-size: 12px;
      font-family: inherit;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-panel);
      color: var(--text-1);
      cursor: pointer;
    }

    .log-toolbar .spacer { flex: 1; }

    .log-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px 24px 20px;
      font-size: 12.5px;
      line-height: 1.75;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
    }

    .log-entry {
      padding: 3px 0;
      animation: fadeIn 200ms var(--ease) both;
      display: flex;
      gap: 12px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(2px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-time {
      color: var(--text-4); flex-shrink: 0;
      font-size: 10.5px; min-width: 66px; padding-top: 2px;
    }

    .log-bot {
      flex-shrink: 0;
      font-weight: 500;
      font-size: 10.5px;
      min-width: 90px;
      color: var(--accent);
      padding-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-text { color: var(--text-2); word-break: break-word; white-space: pre-wrap; flex: 1; }
    .log-entry.done .log-text { color: var(--green-text); font-weight: 500; }
    .log-entry.error .log-text { color: var(--red); }

    .empty-log {
      color: var(--text-4); font-size: 13px; text-align: center; margin-top: 80px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: none;
      border-radius: var(--r-sm);
      font-size: 11.5px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: -0.005em;
      transition: background var(--fast) var(--ease), opacity var(--fast) var(--ease);
    }

    .btn:disabled { opacity: 0.35; cursor: default; }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg-soft); color: var(--text-1); }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-4); }
  </style>
</head>
<body>
  <header>
    <h1>Review Monitor</h1>
    <span class="crumb"><a href="/">← 返回主页</a></span>
    <div class="conn-status">
      <span class="conn-dot" id="conn-dot"></span>
      <span id="conn-text">connecting…</span>
    </div>
  </header>

  <div class="content">
    <div class="tree-panel">
      <div class="tree-header">Bots · Conversations</div>
      <div class="tree-list" id="tree-list">
        <div class="empty-tree">Loading…</div>
      </div>
    </div>

    <div class="msg-panel">
      <div class="msg-head">
        <div class="msg-head-title" id="msg-title">Select a conversation</div>
        <div class="msg-head-sub" id="msg-sub">查看历史消息 · 手动触发回顾</div>
        <div class="msg-head-actions" id="msg-actions"></div>
      </div>
      <div class="msg-list" id="msg-list">
        <div class="msg-empty">Pick a conversation to inspect</div>
      </div>
    </div>

    <div class="log-panel">
      <div class="log-toolbar">
        <label>Filter</label>
        <select id="filter-scope">
          <option value="all">All events</option>
          <option value="selected">This conversation only</option>
        </select>
        <div class="spacer"></div>
        <label><input type="checkbox" id="auto-scroll" checked style="vertical-align:middle"> Auto-scroll</label>
        <button class="btn btn-ghost" onclick="clearLog()">Clear</button>
      </div>
      <div class="log-area" id="log-area">
        <div class="empty-log">Waiting for review events…</div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      bots: [],
      bot: new Map(),
      conv: new Map(),
      selected: null,
      logs: JSON.parse(localStorage.getItem('review_logs') || '[]'),
      es: null,
    };

    init();

    async function init() {
      await loadTree();
      // Deep-link support: /review.html?conv=<id> auto-selects that conversation
      const urlConv = new URLSearchParams(location.search).get('conv');
      if (urlConv && state.conv.has(urlConv)) {
        state.selected = urlConv;
      }
      render();
      renderLogs();
      if (state.selected) renderDetail();
      connectSSE();
    }

    async function loadTree() {
      try {
        const res = await fetch('/api/review/bots');
        state.bots = await res.json();
        state.bot.clear();
        state.conv.clear();
        for (const b of state.bots) {
          state.bot.set(b.id, b);
          for (const c of b.conversations || []) {
            state.conv.set(c.id, { ...c, botId: b.id, botName: b.display_name });
          }
        }
      } catch (e) {
        console.error('loadTree error:', e);
      }
    }

    function botColor(id) {
      let h = 0;
      for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) | 0;
      return `hsl(${Math.abs(h) % 360}, 55%, 58%)`;
    }

    function botInitial(bot) {
      const name = bot?.display_name || bot?.id || '?';
      return name.trim().charAt(0).toUpperCase();
    }

    function render() {
      const root = document.getElementById('tree-list');
      if (state.bots.length === 0) {
        root.innerHTML = '<div class="empty-tree">还没有 Bot</div>';
        return;
      }

      const html = [];
      for (const bot of state.bots) {
        const convs = bot.conversations || [];
        const reviewEnabled = bot.review?.enabled;
        html.push(`
          <div class="bot-group">
            <div class="bot-group-head">
              <span class="bot-avatar" style="background:${botColor(bot.id)}">${esc(botInitial(bot))}</span>
              <span>${esc(bot.display_name || bot.id)}</span>
              <span class="bot-group-meta">${reviewEnabled ? `every ${bot.review?.roundInterval ?? '?'}r` : 'disabled'}</span>
            </div>
            ${convs.length === 0
              ? '<div class="empty-tree" style="margin:4px 0 4px 34px;padding:6px 0;text-align:left;">无对话</div>'
              : convs.map(c => renderConvRow(c)).join('')}
          </div>
        `);
      }
      root.innerHTML = html.join('');

      for (const row of root.querySelectorAll('.conv-item')) {
        row.addEventListener('click', () => selectConv(row.dataset.convId));
      }
    }

    function renderConvRow(conv) {
      const selected = state.selected === conv.id ? 'active' : '';
      const title = conv.title || '新对话';
      const untitled = conv.title ? '' : 'untitled';
      const pending = conv.has_pending ? '<span class="conv-pending-dot" title="Pending review"></span>' : '';
      return `
        <div class="conv-item ${selected}" data-conv-id="${esc(conv.id)}">
          <span class="conv-title ${untitled}">${esc(title)}</span>
          ${pending}
          <span class="conv-rounds">${conv.round_count ?? 0}r</span>
        </div>
      `;
    }

    function selectConv(id) {
      state.selected = id;
      render();
      renderDetail();
      loadMessages(id);
      if (document.getElementById('filter-scope').value === 'selected') renderLogs();
    }

    function renderDetail() {
      const titleEl = document.getElementById('msg-title');
      const subEl = document.getElementById('msg-sub');
      const actions = document.getElementById('msg-actions');

      const conv = state.selected ? state.conv.get(state.selected) : null;
      if (!conv) {
        titleEl.textContent = 'Select a conversation';
        titleEl.classList.remove('untitled');
        subEl.textContent = '查看历史消息 · 手动触发回顾';
        actions.innerHTML = '';
        return;
      }

      const bot = state.bot.get(conv.botId);
      const reviewEnabled = bot?.review?.enabled;

      titleEl.textContent = conv.title || '新对话';
      titleEl.classList.toggle('untitled', !conv.title);
      subEl.innerHTML = `
        <span style="color:var(--text-3);font-weight:500">${esc(conv.botName)}</span>
        &middot; ${conv.user_name ? esc(conv.user_name) : '?'}
        &middot; ${conv.round_count ?? 0} rounds
        &middot; ${conv.msg_count ?? 0} msgs
        ${conv.has_pending ? '&middot; <span style="color:var(--red);font-weight:500">pending</span>' : ''}
      `;

      actions.innerHTML = `
        <button class="btn btn-primary" id="btn-trigger" ${reviewEnabled ? '' : 'disabled'}>
          Trigger Review
        </button>
      `;
      document.getElementById('btn-trigger').onclick = () => triggerReview(conv.id);
    }

    async function loadMessages(convId) {
      const list = document.getElementById('msg-list');
      list.innerHTML = '<div class="msg-empty">Loading…</div>';
      try {
        const res = await fetch(`/api/review/messages/${convId}`);
        const msgs = await res.json();
        if (!msgs.length) {
          list.innerHTML = '<div class="msg-empty">No messages yet</div>';
          return;
        }
        list.innerHTML = '';
        for (const m of msgs) {
          const el = document.createElement('div');
          el.className = `msg-item ${m.sender_type === 'user' ? 'user' : 'bot'}`;
          el.innerHTML = `<div class="msg-sender">${esc(m.sender_type)}</div>${esc(m.content)}`;
          list.appendChild(el);
        }
        list.scrollTop = list.scrollHeight;
      } catch (e) {
        list.innerHTML = '<div class="msg-empty">Failed to load</div>';
      }
    }

    // ── SSE ──

    function connectSSE() {
      if (state.es) state.es.close();
      state.es = new EventSource('/api/review/events');

      state.es.onopen = () => {
        document.getElementById('conn-dot').classList.add('ok');
        document.getElementById('conn-text').textContent = 'connected';
      };

      state.es.onerror = () => {
        document.getElementById('conn-dot').classList.remove('ok');
        document.getElementById('conn-text').textContent = 'reconnecting…';
      };

      state.es.addEventListener('init', () => {});

      state.es.addEventListener('log', (e) => addLog(JSON.parse(e.data)));
      state.es.addEventListener('done', (e) => {
        const data = JSON.parse(e.data);
        addLog({ ...data, type: 'done', content: `Review done: ${data.result}` });
        refreshTree();
      });
    }

    async function refreshTree() {
      await loadTree();
      render();
      if (state.selected) renderDetail();
    }

    // ── Log ──

    function saveLogs() { localStorage.setItem('review_logs', JSON.stringify(state.logs)); }

    function addLog(entry) {
      state.logs.push(entry);
      if (state.logs.length > 2000) state.logs.splice(0, state.logs.length - 2000);
      saveLogs();

      const scope = document.getElementById('filter-scope').value;
      if (scope === 'selected' && entry.conversationId !== state.selected) return;
      appendLogRow(entry);
    }

    function renderLogs() {
      const area = document.getElementById('log-area');
      area.innerHTML = '';
      const scope = document.getElementById('filter-scope').value;
      const rows = scope === 'selected'
        ? state.logs.filter(l => l.conversationId === state.selected)
        : state.logs;
      if (rows.length === 0) {
        area.innerHTML = '<div class="empty-log">Waiting for review events…</div>';
        return;
      }
      for (const r of rows) appendLogRow(r, false);
      scrollLogToBottom();
    }

    function appendLogRow(entry, autoscroll = true) {
      const area = document.getElementById('log-area');
      const empty = area.querySelector('.empty-log');
      if (empty) empty.remove();

      const el = document.createElement('div');
      el.className = 'log-entry';
      if (entry.type === 'done') el.classList.add('done');
      if ((entry.content || '').startsWith('Error')) el.classList.add('error');

      const time = new Date(entry.timestamp).toLocaleTimeString('zh-CN', { hour12: false });
      const botName = state.bot.get(entry.botId)?.display_name || entry.botId || '';

      el.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-bot" title="${esc(botName)}">${esc(botName)}</span>
        <span class="log-text">${esc(entry.content || '')}</span>
      `;
      area.appendChild(el);

      if (autoscroll && document.getElementById('auto-scroll').checked) scrollLogToBottom();
    }

    function scrollLogToBottom() {
      const area = document.getElementById('log-area');
      area.scrollTop = area.scrollHeight;
    }

    function clearLog() {
      state.logs = [];
      saveLogs();
      renderLogs();
    }

    document.getElementById('filter-scope').addEventListener('change', renderLogs);

    // ── Actions ──

    async function triggerReview(convId) {
      try {
        const res = await fetch(`/api/review/trigger/${convId}`, { method: 'POST' });
        const data = await res.json();
        const botId = state.conv.get(convId)?.botId;
        if (data.error) {
          addLog({ conversationId: convId, botId, content: `Trigger failed: ${data.error}`, timestamp: Date.now() });
        } else {
          addLog({ conversationId: convId, botId, content: `Trigger sent`, timestamp: Date.now() });
        }
      } catch (e) {
        addLog({ conversationId: convId, content: `Trigger failed: ${e.message}`, timestamp: Date.now() });
      }
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s ?? '';
      return d.innerHTML;
    }
  </script>
</body>
</html>
