# XcodeGen spec — generates PendingBot.xcodeproj.
#
# Setup:
#   brew install xcodegen
#   cd ios && xcodegen generate
#   open PendingBot.xcodeproj
#
# Why XcodeGen rather than committing a .xcodeproj? The .pbxproj format is
# stateful and merge-hostile; a YAML spec keeps the iOS project structure
# diffable and reproducible alongside the rest of the repo.

name: PendingBot
options:
  bundleIdPrefix: com.pendingname
  deploymentTarget:
    iOS: "17.0"
    # Mac Catalyst maps the iOS 17 SDK onto macOS 14 (Sonoma) and later.
    macOS: "14.0"
  developmentLanguage: zh-Hans
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: "YES"
    # Hard-coded so `xcodegen generate` doesn't blank it out every time —
    # otherwise Xcode pops the "select a team" dialog on every fresh build.
    # If you ship this repo to someone else, swap or move into a gitignored
    # `Local.xcconfig` instead.
    DEVELOPMENT_TEAM: M42BKJN82S
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: NO

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0
  Clerk:
    # Official iOS SDK — handles SIWA, Google OAuth, email-code, JWT
    # session management. We use it on the hosted target only; self-host
    # builds skip the dependency by stripping the import sites.
    url: https://github.com/clerk/clerk-ios
    from: 0.50.0

targets:
  PendingBot:
    type: application
    platform: iOS
    # Single binary that runs on iPhone, iPad, and Mac (via Catalyst).
    # Catalyst is the lightest path: same SwiftUI code, same UIKit bridge —
    # no separate AppKit target to maintain. iPad app on Apple Silicon Macs
    # still works as a fallback for users on macOS without Catalyst opt-in.
    supportedDestinations:
      - iOS
      - macCatalyst
    sources:
      - path: PendingBot
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: PendingBot/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pendingname.bot
        INFOPLIST_FILE: PendingBot/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"           # iPhone + iPad (Catalyst rides on 2)
        SUPPORTS_MACCATALYST: YES
        # Use the same bundle id on Mac so a single App Store record covers
        # iOS + Catalyst — flip to YES if you want a separate Mac-only id.
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        # "Optimize for Mac" — render at native Mac sizing instead of the
        # zoomed iPad metrics. Keeps controls tight in landscape on desktop.
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: "0.1.0"
        # Make Color.accentColor resolve to our asset-catalog AccentColor
        # (the deep forest green). Without this Xcode-generated setting,
        # XcodeGen-built projects fall back to the system blue tint.
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: MarkdownUI
        product: MarkdownUI
      - package: Clerk
        product: Clerk
    info:
      path: PendingBot/Resources/Info.plist
      properties:
        CFBundleDisplayName: 大绿豆
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # 跳过 App Store Connect 上传后那个 "Missing Compliance / Manage" 步骤。
        # 我们只用 HTTPS / Keychain 这些 Apple 系统加密，没有自研加密，所以填 false
        # 就等于回答了"Does your app use encryption? No"。
        ITSAppUsesNonExemptEncryption: false
        # Cold-start screen — cream background with the brand mark centered.
        # Anything else (text, indicators, app name) is intentionally absent.
        UILaunchScreen:
          UIColorName: Cream
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Self-hosted servers are typically plain http on a LAN IP, so we
        # opt out of ATS for arbitrary loads. Production users with TLS can
        # tighten this back up.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Camera access — for QR scanning during onboarding.
        NSCameraUsageDescription: 用于扫描分享二维码导入服务器
        NSPhotoLibraryUsageDescription: 用于在聊天中发送本地图片
        # Triggered the first time we hit a private-IP server (10.x / 172.16-31.x
        # / 192.168.x / 169.254.x / *.local). The system prompt blocks the call
        # until the user responds; we proactively warm it from ImportFlow so
        # the redeem doesn't time out before they tap "允许".
        NSLocalNetworkUsageDescription: 用于连接你部署在局域网内的大绿豆服务器（公网部署不需要这个权限）。
        # Custom URL scheme — share-link landing pages redirect to
        # pendingbot://import?... when Universal Links don't fire.
        CFBundleURLTypes:
          - CFBundleURLName: com.pendingname.bot
            CFBundleURLSchemes:
              - pendingbot
        # Universal Links — the iOS device fetches AASA from each domain
        # listed under `applinks`. This is what makes share-link URLs from
        # the production server open the app instead of Safari.
        com.apple.developer.associated-domains:
          - applinks:bot.pendingname.com
