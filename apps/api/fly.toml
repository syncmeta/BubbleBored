# fly.toml app configuration file generated for pendingbot-api on 2026-04-28T17:59:10+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pendingbot-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  PORT = '3456'

[[mounts]]
  source = 'pendingbot_data'
  destination = '/data'
  initial_size = '1gb'

[[services]]
  protocol = 'tcp'
  internal_port = 3456
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']
    force_https = true

  [[services.ports]]
    port = 80
    handlers = ['http']

  [services.concurrency]
    type = 'requests'
    hard_limit = 500
    soft_limit = 200

  [[services.tcp_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
