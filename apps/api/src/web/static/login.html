<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 · 大绿豆</title>
<link rel="icon" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="stylesheet" href="/tokens.css">
<style>
  /* Mirrors the iOS WelcomeView / SignInView layout: brand mark over a
     serif wordmark, single-column form on warm canvas. The Clerk widget
     is restyled via its `variables` API so its inputs match our jade
     accent + cream surfaces. */
  html, body { min-height: 100% }
  body {
    background: var(--bg);
    color: var(--fg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 48px 24px 32px;
    font-family: var(--font-sans);
  }
  .shell {
    width: 100%; max-width: 28rem;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .brand-mark {
    width: 76px; height: 76px;
    border-radius: 18px;
    box-shadow: 0 4px 14px oklch(0% 0 0 / 0.06);
    background: var(--bg-elevated);
    display: grid; place-items: center;
    overflow: hidden;
  }
  .brand-mark img { width: 100%; height: 100%; object-fit: cover }
  .wordmark {
    font-family: "New York", ui-serif, Georgia, "Songti SC", serif;
    font-weight: 600; font-size: 24px;
    color: var(--fg);
    margin-top: 14px; letter-spacing: .01em;
  }
  .tagline {
    font-size: 13px; line-height: 1.6;
    color: var(--fg-muted);
    text-align: center;
    margin-top: 6px;
    white-space: pre-line;
  }
  .subhead {
    font-size: 13px;
    color: var(--fg-muted);
    margin-top: 20px;
  }
  #clerk-mount { width: 100%; margin-top: 18px }
  #status {
    color: var(--fg-subtle);
    font-size: 13px; margin-top: 14px;
    text-align: center;
  }
  #status.err { color: var(--red) }

  .fallback {
    margin-top: 18px; width: 100%;
    background: var(--bg-elevated);
    border: 0.5px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    line-height: 1.6;
    font-size: 14px;
  }
  .fallback strong { display: block; margin-bottom: 6px; color: var(--fg) }
  .fallback p { margin: 0; color: var(--fg-muted) }
  .fallback code {
    background: var(--bg-muted);
    padding: .1rem .35rem; border-radius: 6px;
    font-family: var(--font-mono);
    font-size: .9em;
  }

  .footer {
    margin-top: 28px;
    text-align: center;
    color: color-mix(in oklch, var(--fg-muted) 70%, transparent);
    font-size: 12px; line-height: 1.6;
    white-space: pre-line;
  }
  .footer a {
    display: inline-block; margin-top: 4px;
    color: color-mix(in oklch, var(--accent) 85%, transparent);
    text-decoration: none;
  }
  .footer a:hover { text-decoration: underline }
</style>
</head>
<body>

<div class="shell">
  <div class="brand-mark"><img src="/favicon.svg" alt="大绿豆"></div>
  <div class="wordmark">大绿豆</div>
  <div class="tagline">主动、自然、不谄媚
帮人审视自我、探索未知的 AI 们</div>

  <div class="subhead">登录或注册</div>

  <div id="clerk-mount"></div>
  <div id="status">加载中…</div>
</div>

<div class="footer">
  登录时会发一份验证码到你的邮箱
第一次登录会自动注册
  <a href="https://github.com/syncmeta/PendingBot" target="_blank" rel="noopener">项目源码：github.com/syncmeta/PendingBot</a>
</div>

<script>
(async function () {
  const status = document.getElementById('status');
  const mount = document.getElementById('clerk-mount');

  let cfg;
  try {
    cfg = await (await fetch('/api/config', { credentials: 'include' })).json();
  } catch (e) {
    status.className = 'err';
    status.textContent = '加载配置失败：' + (e?.message ?? e);
    return;
  }

  if (!cfg.auth?.clerk) {
    // Self-host install — no Clerk wired up. Server-side gate will let
    // /?invite=<token> through to the SPA's inline redeem form, so all
    // we need to do here is point the user at that path.
    status.style.display = 'none';
    document.querySelector('.subhead').style.display = 'none';
    mount.innerHTML = `
      <div class="fallback">
        <strong>这台服务器还没接入 Clerk 登录</strong>
        <p>Admin 在终端日志里能看到一条形如
        <code>https://your-host/i/&lt;token&gt;</code> 的邀请链接，
        把它发给你或在你电脑上用浏览器打开即可创建账号。</p>
      </div>`;
    return;
  }

  const { issuer, publishableKey } = cfg.auth.clerk;
  const sdkUrl = `${issuer.replace(/\/+$/, '')}/npm/@clerk/clerk-js@5/dist/clerk.browser.js`;

  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.async = true;
    s.crossOrigin = 'anonymous';
    s.dataset.clerkPublishableKey = publishableKey;
    s.src = sdkUrl;
    s.onload = resolve;
    s.onerror = () => reject(new Error('failed to load Clerk SDK'));
    document.head.appendChild(s);
  });

  if (!window.Clerk) {
    status.className = 'err';
    status.textContent = 'Clerk SDK 加载完成但未挂上 window.Clerk — 检查 publishable key';
    return;
  }

  await window.Clerk.load({});

  if (window.Clerk.session) {
    await exchangeAndRedirect();
    return;
  }

  status.style.display = 'none';
  window.Clerk.mountSignIn(mount, {
    afterSignInUrl: '/login.html',
    afterSignUpUrl: '/login.html',
  });

  const tick = setInterval(async () => {
    if (window.Clerk.session) {
      clearInterval(tick);
      await exchangeAndRedirect();
    }
  }, 800);
})();

async function exchangeAndRedirect() {
  const status = document.getElementById('status');
  status.style.display = 'block';
  status.className = '';
  status.textContent = '登录中…';
  try {
    const token = await window.Clerk.session.getToken();
    const res = await fetch('/api/auth/clerk/exchange', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err || `exchange failed (${res.status})`);
    }
    location.replace('/');
  } catch (e) {
    status.className = 'err';
    status.textContent = '换 token 失败：' + (e?.message ?? e);
  }
}
</script>
</body>
</html>
